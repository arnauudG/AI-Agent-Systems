<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- background -->
  <g id="background">
    <rect width="960" height="540" fill="#fff"/>
  </g>
  <!-- header -->
  <g id="header">
    <g id="title">
      <text x="48" y="56" font-family="sans-serif" font-size="24" font-weight="600" fill="#1a1a1a">Two-column comparison</text>
    </g>
  </g>
  <!-- body: left column -->
  <g id="left-column">
    <rect x="48" y="88" width="408" height="380" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
    <text x="72" y="120" font-family="sans-serif" font-size="16" font-weight="600" fill="#333">Left column title</text>
    <text x="72" y="148" font-family="sans-serif" font-size="14" fill="#555">Content or items go here. Keep spacing consistent.</text>
  </g>
  <!-- body: right column -->
  <g id="right-column">
    <rect x="504" y="88" width="408" height="380" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
    <text x="528" y="120" font-family="sans-serif" font-size="16" font-weight="600" fill="#333">Right column title</text>
    <text x="528" y="148" font-family="sans-serif" font-size="14" fill="#555">Content or items go here. Same gutter (48px).</text>
  </g>
  <!-- optional: center divider or arrow -->
  <g id="connectors">
    <!-- Add arrow or "vs" label between columns if needed -->
  </g>
  <!-- footer -->
  <g id="footer">
    <text x="48" y="512" font-family="sans-serif" font-size="12" fill="#888">Source or note</text>
  </g>
</svg>
