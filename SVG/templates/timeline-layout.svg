<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- background -->
  <g id="background">
    <rect width="960" height="540" fill="#fff"/>
  </g>
  <!-- header -->
  <g id="header">
    <g id="title">
      <text x="48" y="56" font-family="sans-serif" font-size="24" font-weight="600" fill="#1a1a1a">Timeline</text>
    </g>
  </g>
  <!-- timeline: horizontal line -->
  <g id="timeline">
    <line x1="80" y1="280" x2="880" y2="280" stroke="#333" stroke-width="2"/>
    <!-- milestone 1 -->
    <g id="milestone-1">
      <circle cx="200" cy="280" r="8" fill="#333"/>
      <line x1="200" y1="288" x2="200" y2="340" stroke="#ccc" stroke-width="1"/>
      <rect x="120" y="348" width="160" height="80" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
      <text x="140" y="378" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Phase 1</text>
      <text x="140" y="398" font-family="sans-serif" font-size="12" fill="#555">Description</text>
    </g>
    <!-- milestone 2 -->
    <g id="milestone-2">
      <circle cx="480" cy="280" r="8" fill="#333"/>
      <line x1="480" y1="288" x2="480" y2="340" stroke="#ccc" stroke-width="1"/>
      <rect x="400" y="348" width="160" height="80" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
      <text x="420" y="378" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Phase 2</text>
      <text x="420" y="398" font-family="sans-serif" font-size="12" fill="#555">Description</text>
    </g>
    <!-- milestone 3 -->
    <g id="milestone-3">
      <circle cx="760" cy="280" r="8" fill="#333"/>
      <line x1="760" y1="288" x2="760" y2="340" stroke="#ccc" stroke-width="1"/>
      <rect x="680" y="348" width="160" height="80" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
      <text x="700" y="378" font-family="sans-serif" font-size="14" font-weight="600" fill="#333">Phase 3</text>
      <text x="700" y="398" font-family="sans-serif" font-size="12" fill="#555">Description</text>
    </g>
  </g>
  <!-- footer -->
  <g id="footer">
    <text x="48" y="512" font-family="sans-serif" font-size="12" fill="#888">Source or note</text>
  </g>
</svg>
