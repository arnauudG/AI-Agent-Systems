<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- background -->
  <g id="background">
    <rect width="960" height="540" fill="#fff"/>
  </g>
  <!-- header -->
  <g id="header">
    <g id="title">
      <text x="48" y="72" font-family="sans-serif" font-size="28" font-weight="600" fill="#1a1a1a">Diagram title</text>
    </g>
    <g id="subtitle">
      <text x="48" y="104" font-family="sans-serif" font-size="16" fill="#555">Subtitle or context line</text>
    </g>
  </g>
  <!-- body containers -->
  <g id="body">
    <g id="content-area">
      <rect x="48" y="140" width="864" height="340" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4 2"/>
      <text x="72" y="172" font-family="sans-serif" font-size="14" fill="#888">Main content area  add groups and shapes here</text>
    </g>
  </g>
  <!-- footer -->
  <g id="footer">
    <line x1="48" y1="500" x2="912" y2="500" stroke="#e0e0e0" stroke-width="1"/>
    <text x="48" y="522" font-family="sans-serif" font-size="12" fill="#888">Footer / page or source note</text>
  </g>
</svg>
